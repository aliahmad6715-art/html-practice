<html>
  <body>
    <canvas id="mycanvas" width="500" height="600" style="border: dotted blue">
    </canvas>

    <script>
      const canvas = document.getElementById("mycanvas");
      const ctx = canvas.getContext("2d");

      ctx.font = "30px Arial";

      ctx.fillStyle = "red";

      ctx.fillText("Hello Ali!", 100, 100);
    </script>
  </body>
</html>
